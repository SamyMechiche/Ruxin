<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
            <title>Pixel Floral Memory</title>
                <link rel="stylesheet" href="style.css">
                </head>
                <body>
                    <div class="game-wrapper">
                            <div class="game-container">
                                        <div class="pixel-corners">
                                                        <div class="header">
                                                                            <h1 id="gameTitle">🌸 PIXEL FLORAL MEMORY 🌸</h1>
                                                                                                <p id="gameSubtitle" class="subtitle">match the flowers !</p>
                                                                                                                </div>

                                                                                                                                <div class="stats">
                                                                                                                                                    <div class="stat-box">
                                                                                                                                                                            <div class="stat-label" id="movesLabel">MOVES</div>
                                                                                                                                                                                                    <div class="stat-value" id="moves">0</div>
                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                            <div class="stat-box">
                                                                                                                                                                                                                                                                    <div class="stat-label" id="timeLabel">TIME</div>
                                                                                                                                                                                                                                                                                            <div class="stat-value" id="timer">0s</div>
                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                    <div class="stat-box">
                                                                                                                                                                                                                                                                                                                                                            <div class="stat-label" id="bestLabel">BEST</div>
                                                                                                                                                                                                                                                                                                                                                                                    <div class="stat-value" id="bestScore">-</div>
                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="board" id="board"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="pixel-button" id="resetBtn">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <span id="resetText">🌱 NEW GAME 🌱</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="message pixel-message" id="message"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="lang-switch" id="langSwitch">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <span class="lang-emoji">🌐</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <span id="langText">中文</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
